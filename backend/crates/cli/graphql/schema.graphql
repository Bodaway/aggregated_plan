"""
Combined mutation root that merges the base MutationRoot with future module roots.
"""
type CombinedMutation {
	"""
	No-op mutation placeholder. Returns true.
	"""
	noop: Boolean!
	"""
	Create a new personal task.
	"""
	createTask(input: CreateTaskInput!): TaskGql!
	"""
	Update an existing task.
	"""
	updateTask(id: ID!, input: UpdateTaskInput!): TaskGql!
	"""
	Delete a task by ID. Returns true on success.
	"""
	deleteTask(id: ID!): Boolean!
	"""
	Mark a task as completed.
	"""
	completeTask(id: ID!): TaskGql!
	"""
	Append a line of text to a task's user-owned `notes` field. Backs the
	activity-timer "quick note" feature: existing content is preserved and
	the new text is added on a new paragraph.
	"""
	appendTaskNotes(taskId: ID!, text: String!): TaskGql!
	"""
	Set the tracking state of a task (inbox/followed/dismissed).
	"""
	setTrackingState(taskId: ID!, state: TrackingStateGql!): TaskGql!
	"""
	Batch-set the tracking state for multiple tasks.
	"""
	setTrackingStateBatch(taskIds: [ID!]!, state: TrackingStateGql!): [TaskGql!]!
	"""
	Override the urgency level of a task (manual override).
	"""
	updatePriority(taskId: ID!, urgency: UrgencyLevelGql, impact: ImpactLevelGql): TaskGql!
	"""
	Reset urgency to auto-calculated based on deadline.
	"""
	resetUrgency(taskId: ID!): TaskGql!
	"""
	Trigger a sync for a specific source (or all sources if not specified).
	Returns updated sync statuses.
	"""
	forceSync(source: SourceGql): [SyncStatusGql!]!
	"""
	Manually link two tasks.
	"""
	linkTasks(taskIdPrimary: ID!, taskIdSecondary: ID!): Boolean!
	"""
	Unlink two tasks by removing their link.
	"""
	unlinkTasks(linkId: ID!): Boolean!
	"""
	Confirm or reject a deduplication suggestion.
	"""
	confirmDeduplication(taskIdPrimary: ID!, taskIdSecondary: ID!, accept: Boolean!): Boolean!
	"""
	Resolve an alert by ID.
	"""
	resolveAlert(id: ID!): AlertGql!
	"""
	Start tracking a new activity. Stops the previous active slot (if any).
	"""
	startActivity(taskId: ID): ActivitySlotGql!
	"""
	Stop the currently active activity tracking.
	"""
	stopActivity: ActivitySlotGql
	"""
	Update an existing activity slot.
	"""
	updateActivitySlot(id: ID!, input: UpdateActivitySlotInput!): ActivitySlotGql!
	"""
	Delete an activity slot by ID.
	"""
	deleteActivitySlot(id: ID!): Boolean!
	"""
	Create a manual activity slot with explicit start and end times.
	"""
	createActivitySlot(input: CreateActivitySlotInput!): ActivitySlotGql!
	"""
	Update the project association of a meeting.
	"""
	updateMeetingProject(meetingId: ID!, projectId: ID): MeetingGql!
	"""
	Create a new tag.
	"""
	createTag(name: String!, color: String): TagGql!
	"""
	Update an existing tag.
	"""
	updateTag(id: ID!, name: String, color: String): TagGql!
	"""
	Delete a tag by ID. Returns true on success.
	"""
	deleteTag(id: ID!): Boolean!
	"""
	Update a configuration key-value pair.
	"""
	updateConfiguration(key: String!, value: String!): Boolean!
}

"""
Combined query root that merges the base QueryRoot with future module roots.
"""
type CombinedQuery {
	"""
	Health check query. Returns true if the server is running.
	"""
	health: Boolean!
	"""
	Fetch a single task by its ID.
	"""
	task(id: ID!): TaskGql
	"""
	Fetch tasks with optional filtering and cursor-based pagination.
	"""
	tasks(filter: TaskFilterInput, first: Int! = 50, after: String): TaskConnection!
	"""
	Fetch all projects for the current user.
	"""
	projects: [ProjectGql!]!
	"""
	Fetch all tags for the current user.
	"""
	tags: [TagGql!]!
	"""
	Fetch the daily dashboard for a given date, including tasks, meetings, alerts,
	sync statuses, and the weekly workload for the containing week.
	"""
	dailyDashboard(date: NaiveDate!): DailyDashboardGql!
	"""
	Fetch the weekly workload for a given week (identified by the Monday date).
	"""
	weeklyWorkload(weekStart: NaiveDate!): WeeklyWorkloadGql!
	"""
	Get the Eisenhower priority matrix for the current user.
	"""
	priorityMatrix: PriorityMatrixGql!
	"""
	Fetch all sync statuses for the current user.
	"""
	syncStatuses: [SyncStatusGql!]!
	"""
	Get deduplication suggestions for the current user.
	"""
	deduplicationSuggestions: [DeduplicationSuggestionGql!]!
	"""
	Get alerts for the current user with optional filtering and cursor-based pagination.
	"""
	alerts(resolved: Boolean, first: Int! = 50, after: String): AlertConnection!
	"""
	Get the activity journal for a given date.
	"""
	activityJournal(date: NaiveDate!): [ActivitySlotGql!]!
	"""
	Get the currently active activity slot.
	"""
	currentActivity: ActivitySlotGql
	"""
	Get a weekly activity summary with daily totals and per-task breakdown.
	"""
	weeklyActivitySummary(weekStart: NaiveDate!): WeeklyActivitySummaryGql!
	"""
	Get user configuration as a JSON-like list of key-value pairs.
	"""
	configuration: JSON!
}

