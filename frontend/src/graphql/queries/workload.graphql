query WeeklyWorkload($weekStart: NaiveDate!) {
  weeklyWorkload(weekStart: $weekStart) {
    weekStart
    capacity
    totalPlanned
    totalMeetings
    overload
    workingDays
    halfDays {
      date
      halfDay
      consumption
      isFree
      meetings {
        title
        startTime
        endTime
        durationHours
      }
      tasks {
        title
        estimatedHours
      }
    }
  }
}
