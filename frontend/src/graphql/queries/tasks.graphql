query Tasks($filter: TaskFilter, $first: Int, $after: String) {
  tasks(filter: $filter, first: $first, after: $after) {
    edges {
      node {
        id
        title
        description
        source
        status
        deadline
        urgency
        urgencyManual
        impact
        quadrant
        assignee
        project {
          id
          name
        }
        tags {
          id
          name
          color
        }
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
    totalCount
  }
}

query Task($id: ID!) {
  task(id: $id) {
    id
    title
    description
    source
    sourceId
    jiraStatus
    status
    deadline
    plannedStart
    plannedEnd
    estimatedHours
    urgency
    urgencyManual
    impact
    quadrant
    assignee
    project {
      id
      name
    }
    tags {
      id
      name
      color
    }
    createdAt
    updatedAt
  }
}
