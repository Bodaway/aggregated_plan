query DailyDashboard($date: Date!) {
  dailyDashboard(date: $date) {
    date
    tasks {
      id
      title
      status
      urgency
      impact
      quadrant
      deadline
      assignee
      project {
        name
      }
      tags {
        id
        name
        color
      }
    }
    meetings {
      id
      title
      startTime
      endTime
      location
      durationHours
    }
    alerts {
      id
      alertType
      severity
      message
      resolved
      createdAt
    }
    weeklyWorkload {
      weekStart
      capacity
      totalPlanned
      totalMeetings
      overload
      halfDays {
        date
        halfDay
        consumption
        isFree
        meetings {
          title
          startTime
          endTime
        }
        tasks {
          title
        }
      }
    }
    syncStatuses {
      source
      status
      lastSyncAt
      errorMessage
    }
  }
}
